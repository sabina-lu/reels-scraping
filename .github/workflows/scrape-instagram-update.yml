name: scrape-instagram-update

on:
  workflow_run:
    workflows: ["scrape-instagram-scan"]
    types:
      - completed
  workflow_dispatch:

jobs:
  scrape-reels-update:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    env:
      TZ: Asia/Taipei
      CHROME_BIN: /usr/bin/google-chrome

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Ensure data files exist
        run: |
          mkdir -p data
          [ -f data/kol_info.csv ] || printf "kol_account\n" > data/kol_info.csv
          [ -f data/profile_post_state.csv ] || printf "kol_account,profile_post_count,last_checked_at,last_changed_at,check_status\n" > data/profile_post_state.csv
          [ -f data/reels_static_info.csv ] || printf "kol_account,reels_shortcode,post_time,duration,caption\n" > data/reels_static_info.csv
          [ -f data/reels_dynamic_info.csv ] || printf "reels_shortcode,views,plays,likes,comments,timestamp\n" > data/reels_dynamic_info.csv

      - name: Run update_reels
        run: python update_reels.py

      - name: Commit and push CSV updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.csv
          git diff --cached --quiet && exit 0
          git commit -m "Update Instagram CSV data"

          git pull --rebase origin main || true
          git push